<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Pro</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#172033;font-family:Georgia,'Times New Roman',serif}.app{max-width:430px;margin:auto;min-height:100vh;padding:16px}header{text-align:center;padding:16px 0 10px}header h1{margin:0;font-size:28px}header p{margin:6px 0 0;color:#64748b;font-size:13px;font-family:Arial}.screen{display:none}.screen.active{display:block}.menu{margin-top:70px;display:flex;flex-direction:column;gap:14px}.main-btn{background:#172033;border:1px solid #0f172a;border-radius:2px;padding:18px;font-size:17px;font-weight:800;color:#fff;text-transform:uppercase}.card{background:#fff;border:1px solid #cbd5e1;border-radius:2px;padding:14px;margin-top:14px}h2{font-size:24px;margin:0 0 16px}label{display:block;font-size:12px;color:#64748b;margin:12px 0 6px;font-family:Arial;font-weight:700;text-transform:uppercase;letter-spacing:.6px}input,select{width:100%;padding:12px;border-radius:2px;border:1px solid #cbd5e1;background:#fff;color:#172033;font-size:15px}input.plate{text-transform:uppercase}button{width:100%;padding:12px;border:1px solid #0f172a;border-radius:2px;margin-top:8px;font-size:13px;font-weight:800;background:#172033;color:#fff;text-transform:uppercase}.btn-light{background:#fff;color:#172033;border:1px solid #cbd5e1}.btn-red{background:#991b1b}.btn-blue{background:#1e3a8a}.item{border:1px solid #cbd5e1;border-radius:2px;padding:10px;margin-top:8px;background:#fff}.plate-title{font-size:24px;font-weight:900;letter-spacing:1.5px;font-family:Arial;color:#172033}.small{color:#64748b;font-size:13px;margin-top:5px;line-height:1.45;font-family:Arial}.total{margin-top:10px;font-size:19px;font-weight:900;color:#172033;font-family:Arial}.hamburger{position:fixed;top:12px;left:12px;width:40px;height:40px;background:white;color:#111827;border:1px solid #cbd5e1;padding:0;z-index:10;display:none}.side-menu{position:fixed;top:62px;left:12px;width:220px;background:white;border:1px solid #cbd5e1;padding:8px;display:none;z-index:9}.side-menu.show{display:block}.side-menu button{background:#f9fafb;color:#111827;border:1px solid #e5e7eb;text-align:left}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.ticket-full{position:fixed;inset:0;z-index:50;background:#f4f6f8;padding:18px;display:none;align-items:center;justify-content:center}.ticket-full.active{display:flex}.ticket-full .card{width:100%;max-width:430px;min-height:92vh;margin:0;display:flex;flex-direction:column;justify-content:center;text-align:center}#qrScannerBox{position:fixed;inset:0;z-index:100;background:#000;display:none;align-items:center;justify-content:center}#qrScannerBox.active{display:flex}#qrVideo{width:100%;height:100%;object-fit:cover}#qrControls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;padding:0 16px}@media print{body{background:white}.hamburger,.side-menu,button{display:none!important}.ticket-full.active{position:static;display:block;background:white;padding:0}.ticket-full .card{min-height:auto;border:0}}
</style>
</head>
<body>
<div class="app">
<header><h1 id="title">Parking Pro</h1><p>Sistema de estacionamiento</p></header>
<button id="menuBtn" class="hamburger" onclick="toggleMenu()">☰</button>
<div id="sideMenu" class="side-menu"><button id="adminUsersBtn" onclick="openScreen('users')">Crear cuentas</button><button id="configMenuBtn" onclick="openScreen('config')">Configuración</button><button onclick="openScreen('history')">Recaudación / Historial</button><button onclick="openScreen('inside')">Vehículos ingresados</button><button onclick="openScreen('userReport')">Reporte usuarios</button><button onclick="exportExcel()">Exportar Excel</button><button onclick="logout()">Cerrar sesión</button></div>
<section id="login" class="screen"><div class="card"><h2>Iniciar sesión</h2><label>RUT</label><input id="loginRut" placeholder="11111111-1"><label>Clave</label><input id="loginPass" type="password" placeholder="1234"><label>Tipo de cuenta</label><select id="loginRole"><option value="user">Usuario</option><option value="admin">Administrador</option></select><button class="btn-blue" onclick="login()">Entrar</button><div class="small">Admin inicial: 11111111-1 / 1234</div></div></section>
<section id="home" class="screen"><div class="menu"><button class="main-btn" onclick="openScreen('entry')">Entrada</button><button class="main-btn" onclick="openScreen('exit')">Salida</button><button class="main-btn" onclick="openScreen('search')">Buscar</button></div></section>
<section id="entry" class="screen"><div class="card"><h2>Entrada</h2><label>Patente</label><input id="entryPlate" class="plate" placeholder="AB1234" maxlength="8"><label>Tipo de vehículo</label><select id="entryType"><option>Auto</option><option>Camioneta</option><option>Moto</option><option>Camión</option></select><button class="btn-blue" onclick="saveEntry()">Ingresar</button><button class="btn-light" onclick="goHome()">Volver</button></div></section>
<section id="entryTicket" class="screen ticket-full"><div class="card"><h2>Vehículo ingresado</h2><div id="entryTicketInfo"></div><button class="btn-blue" onclick="printTicket()">Imprimir / guardar PDF</button><button class="btn-light" onclick="shareTicketAsImage('entryTicketInfo')">Compartir imagen</button><button class="btn-blue" onclick="goHome()">Aceptar</button></div></section>
<section id="exit" class="screen"><div class="card"><h2>Salida</h2><label>Patente</label><input id="exitPlate" class="plate" placeholder="AB1234" maxlength="8" oninput="previewExit()"><button class="btn-light" onclick="scanQrCamera()">Leer QR</button><div id="qrScannerBox"><video id="qrVideo" playsinline></video><div id="qrControls"><button class="btn-red" onclick="stopQrCamera()">Cerrar</button></div></div><div id="exitInfo"></div><label>Estado de cobro</label><select id="paymentStatus"><option>Pagado</option><option>Pendiente</option></select><button class="btn-red" onclick="openConfirm()">Salida</button><button class="btn-light" onclick="goHome()">Volver</button></div></section>
<section id="confirm" class="screen"><div class="card"><h2>Confirmar salida</h2><div id="confirmInfo"></div><button class="btn-red" onclick="confirmExit()">Imprimir</button><button class="btn-light" onclick="openScreen('exit')">Volver</button></div></section>
<section id="exitTicket" class="screen ticket-full"><div class="card"><h2>Salida registrada</h2><div id="exitTicketInfo"></div><button class="btn-blue" onclick="printTicket()">Imprimir</button><button class="btn-light" onclick="shareTicketAsImage('exitTicketInfo')">Compartir imagen</button><button class="btn-light" onclick="goHome()">Volver al inicio</button></div></section>
<section id="search" class="screen"><div class="card"><h2>Buscar</h2><label>Patente</label><input id="searchPlate" class="plate" placeholder="Buscar patente" oninput="renderSearch()"><div id="searchList"></div><button class="btn-light" onclick="goHome()">Volver</button></div></section>
<section id="inside" class="screen"><div class="card"><h2>Vehículos dentro</h2><div id="insideList"></div><button class="btn-light" onclick="goHome()">Volver</button></div></section>
<section id="history" class="screen"><div class="card"><h2>Recaudación</h2><div id="revenueBox"></div><div class="two"><button class="btn-light" onclick="renderHistory('day')">Del día</button><button class="btn-light" onclick="renderHistory('month')">Del mes</button></div><div id="historySummary"></div><div id="historyList"></div><button class="btn-light" onclick="goHome()">Volver</button></div></section>
<section id="config" class="screen"><div class="card"><h2>Configuración</h2><label>Nombre</label><input id="configName"><label>Tarifa base</label><input id="configRate" type="number"><label>Minutos por bloque</label><input id="configBlock" type="number"><label>Modo de cobro</label><select id="configMode"><option value="block">Por bloque completo</option><option value="minute">Por minuto exacto</option></select><button class="btn-blue" onclick="saveConfig()">Guardar</button><button class="btn-light" onclick="goHome()">Volver</button></div></section>
<section id="userReport" class="screen"><div class="card"><h2>Reporte por usuario</h2><div id="userReportList"></div><button class="btn-light" onclick="goHome()">Volver</button></div></section>
<section id="users" class="screen"><div class="card"><h2>Crear cuenta</h2><label>RUT nuevo usuario</label><input id="newUserRut" placeholder="12.345.678-9"><label>Nombre</label><input id="newUserName" placeholder="Nombre"><label>Clave</label><input id="newUserPass" type="password" placeholder="Clave"><label>Tipo</label><select id="newUserRole"><option value="user">Usuario</option><option value="admin">Administrador</option></select><button class="btn-blue" onclick="createUser()">Crear cuenta</button><div id="usersList"></div><button class="btn-light" onclick="goHome()">Volver</button></div></section>
</div>
<script>
'use strict';
const STORAGE_KEYS={config:'pp_config',active:'pp_active',history:'pp_history',users:'pp_users',currentUser:'pp_current_user'};
let config=safeRead(STORAGE_KEYS.config,{name:'Parking Pro',rate:600,block:30,mode:'block'}),active=safeRead(STORAGE_KEYS.active,[]),history=safeRead(STORAGE_KEYS.history,[]),users=safeRead(STORAGE_KEYS.users,[{rut:'11111111-1',name:'Administrador',pass:'1234',role:'admin'}]),currentUser=safeRead(STORAGE_KEYS.currentUser,null),qrStream=null,qrTimer=null;
function safeRead(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch(e){return f}}function byId(id){return document.getElementById(id)}function clean(v){return String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,'').trim()}function safeText(v){return String(v==null?'':v).replace(/[\u0000-\u001F\u007F]/g,' ').replace(/\s+/g,' ').trim()}function money(v){return '$'+Math.round(Number(v)||0).toLocaleString('es-CL')}function csvCell(v){return '"'+safeText(v).replace(/"/g,'""')+'"'}function calc(s,e){const m=Math.max(1,Math.ceil((Number(e)-Number(s))/60000)),r=Number(config.rate)||600,b=Number(config.block)||30,t=config.mode==='minute'?Math.round((m/b)*r):Math.round(Math.ceil(m/b)*r);return{min:m,total:t}}
function save(){localStorage.setItem(STORAGE_KEYS.config,JSON.stringify(config));localStorage.setItem(STORAGE_KEYS.active,JSON.stringify(active));localStorage.setItem(STORAGE_KEYS.history,JSON.stringify(history));localStorage.setItem(STORAGE_KEYS.users,JSON.stringify(users));refresh()}function showOnly(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));const e=byId(id);if(e)e.classList.add('active')}function openScreen(id){if(!currentUser&&id!=='login')id='login';if(currentUser&&currentUser.role!=='admin'&&(id==='users'||id==='config')){alert('Solo el administrador puede entrar a esta sección');id='home'}showOnly(id);byId('sideMenu').classList.remove('show');if(id==='inside')renderInside();if(id==='search')renderSearch();if(id==='history')renderHistory('day');if(id==='config')loadConfig();if(id==='exit')previewExit();if(id==='users')renderUsers();if(id==='userReport')renderUserReport();refresh()}function goHome(){openScreen('home')}function toggleMenu(){byId('sideMenu').classList.toggle('show')}
function login(){const r=byId('loginRut').value.trim(),p=byId('loginPass').value,role=byId('loginRole').value,u=users.find(x=>x.rut===r&&x.pass===p&&x.role===role);if(!u)return alert('RUT, clave o tipo de cuenta incorrectos');currentUser={rut:u.rut,name:u.name,role:u.role};localStorage.setItem(STORAGE_KEYS.currentUser,JSON.stringify(currentUser));openScreen('home')}function logout(){currentUser=null;localStorage.removeItem(STORAGE_KEYS.currentUser);openScreen('login')}function createUser(){if(!currentUser||currentUser.role!=='admin')return alert('Solo administrador');const rut=byId('newUserRut').value.trim(),name=byId('newUserName').value.trim()||'Usuario',pass=byId('newUserPass').value,role=byId('newUserRole').value;if(!rut||!pass)return alert('Ingrese RUT y clave');if(users.some(u=>u.rut===rut))return alert('Ese RUT ya existe');users.push({rut,name,pass,role});save();byId('newUserRut').value='';byId('newUserName').value='';byId('newUserPass').value='';renderUsers();alert('Cuenta creada')}function renderUsers(){byId('usersList').innerHTML=users.map(u=>'<div class="item"><div class="plate-title" style="font-size:16px">'+safeText(u.name)+'</div><div class="small">'+safeText(u.rut)+' · '+(u.role==='admin'?'Administrador':'Usuario')+'</div></div>').join('')}
function saveEntry(){const plate=clean(byId('entryPlate').value),type=byId('entryType').value;if(!plate)return alert('Ingrese patente');if(active.some(a=>a.plate===plate))return alert('Ese vehículo ya está dentro');const entry={id:Date.now(),plate,type,inTime:Date.now(),user:currentUser?currentUser.name:''};active.unshift(entry);byId('entryPlate').value='';save();showEntryTicket(entry)}function qrUrl(data){return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(data)}function ticketHtml(kind,rec){const isExit=kind==='SALIDA',qr=qrUrl((isExit?'SALIDA':'PARKING')+'|'+rec.plate+'|'+rec.type+'|'+rec.inTime+(isExit?'|'+rec.outTime+'|'+rec.total:''));return '<div class="item ticket-content" data-qr="'+qr+'" style="text-align:center"><div style="font-family:Arial;font-size:12px;font-weight:bold">'+safeText(config.name)+'</div><div class="small">TICKET DE '+kind+'</div><hr><div class="plate-title" style="font-size:36px;margin-bottom:10px">'+safeText(rec.plate)+'</div><div class="small">Tipo: '+safeText(rec.type)+'</div>'+(isExit?'<div class="small">Entrada: '+new Date(rec.inTime).toLocaleString('es-CL')+'</div><div class="small">Salida: '+new Date(rec.outTime).toLocaleString('es-CL')+'</div><div class="small">Tiempo estacionado: '+safeText(rec.minutes)+' minutos</div><div class="small">Estado: '+safeText(rec.status)+'</div><div class="total">Total: '+money(rec.total)+'</div>':'<div class="small">Fecha: '+new Date(rec.inTime).toLocaleDateString('es-CL')+'</div><div class="small">Hora entrada: '+new Date(rec.inTime).toLocaleTimeString('es-CL')+'</div><div class="small">Tarifa: '+money(config.rate)+' / '+safeText(config.block)+' min</div>')+'<div class="small">Operador: '+safeText(rec.user)+'</div><img src="'+qr+'" alt="QR" style="width:180px;height:180px;margin:22px auto 10px;display:block;border-radius:4px;border:1px solid #e5e7eb;padding:8px;background:white"><div class="small">Código: '+safeText(rec.id)+'</div><hr><div class="small">'+(isExit?'Gracias por su preferencia':'Conserve este ticket')+'</div></div>'}function showEntryTicket(e){byId('entryTicketInfo').innerHTML=ticketHtml('ENTRADA',e);openScreen('entryTicket')}function showExitTicket(r){byId('exitTicketInfo').innerHTML=ticketHtml('SALIDA',r);openScreen('exitTicket')}
function similar(q){q=clean(q);if(!q)return[];return active.filter(a=>a.plate.includes(q)||q.includes(a.plate.slice(0,Math.min(q.length,a.plate.length)))).slice(0,8)}function itemHtml(a,b){const c=calc(a.inTime,Date.now());return '<div class="item"><div class="plate-title">'+safeText(a.plate)+'</div><div class="small">'+safeText(a.type)+' · Entrada: '+new Date(a.inTime).toLocaleString('es-CL')+'</div><div class="small">Tiempo: '+c.min+' minutos</div><div class="total">'+money(c.total)+'</div>'+(b?'<button class="btn-red" onclick="selectExit(\''+safeText(a.plate)+'\')">Cobrar salida</button>':'')+'</div>'}function previewExit(){const box=byId('exitInfo'),q=clean(byId('exitPlate').value);if(!q){box.innerHTML='<div class="item small">Escribe una patente para ver coincidencias.</div>';return}const ex=active.find(a=>a.plate===q);if(ex){box.innerHTML=itemHtml(ex,false);return}const res=similar(q);box.innerHTML=res.length?res.map(a=>'<div class="item" onclick="selectExit(\''+safeText(a.plate)+'\')"><div class="plate-title">'+safeText(a.plate)+'</div><div class="small">'+safeText(a.type)+'</div></div>').join(''):'<div class="item small">No hay patentes similares.</div>'}function selectExit(p){byId('exitPlate').value=clean(p);openScreen('exit');previewExit()}function openConfirm(){const p=clean(byId('exitPlate').value),car=active.find(a=>a.plate===p);if(!car)return alert('No encontré esa patente dentro');const out=Date.now(),c=calc(car.inTime,out),st=byId('paymentStatus').value;byId('confirmInfo').innerHTML='<div class="item"><div class="plate-title">'+safeText(car.plate)+'</div><div class="small">Tipo: '+safeText(car.type)+'</div><div class="small">Fecha entrada: '+new Date(car.inTime).toLocaleDateString('es-CL')+'</div><div class="small">Hora entrada: '+new Date(car.inTime).toLocaleTimeString('es-CL')+'</div><div class="small">Fecha salida: '+new Date(out).toLocaleDateString('es-CL')+'</div><div class="small">Hora salida: '+new Date(out).toLocaleTimeString('es-CL')+'</div><div class="small">Tiempo estacionado: '+c.min+' minutos</div><div class="small">Estado: '+safeText(st)+'</div><div class="total">Total: '+money(c.total)+'</div></div>';openScreen('confirm')}function confirmExit(){const p=clean(byId('exitPlate').value),i=active.findIndex(a=>a.plate===p);if(i<0)return alert('No encontrado');const car=active[i],out=Date.now(),c=calc(car.inTime,out),status=byId('paymentStatus').value,record={...car,outTime:out,minutes:c.min,total:c.total,status,user:currentUser?currentUser.name:''};history.unshift(record);active.splice(i,1);byId('exitPlate').value='';save();showExitTicket(record)}
function printTicket(){window.print()}function shareTicketAsImage(id){alert('Para compartir como imagen: usa Imprimir / guardar PDF o captura de pantalla.')}function downloadImage(blob){const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='ticket-parking.png';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},0)}
function applyQrData(data){if(!data)return;const parts=String(data).split('|'),plate=parts[1]||data;byId('exitPlate').value=clean(plate);previewExit()}function scanQrPrompt(){const data=prompt('Pega aquí el texto del QR');applyQrData(data)}async function scanQrCamera(){if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert('Tu navegador no permite usar cámara');return}if(!('BarcodeDetector'in window)){alert('Tu navegador no soporta QR automático');return}try{const box=byId('qrScannerBox'),video=byId('qrVideo');box.classList.add('active');qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});video.srcObject=qrStream;await video.play();const detector=new BarcodeDetector({formats:['qr_code']});qrTimer=setInterval(async()=>{try{const codes=await detector.detect(video);if(codes.length){const value=codes[0].rawValue;stopQrCamera();applyQrData(value)}}catch(e){}},500)}catch(e){alert('Error al abrir cámara')}}function stopQrCamera(){if(qrTimer){clearInterval(qrTimer);qrTimer=null}if(qrStream){qrStream.getTracks().forEach(t=>t.stop());qrStream=null}const box=byId('qrScannerBox'),video=byId('qrVideo');if(video)video.srcObject=null;box.classList.remove('active')}
function buildCsv(){const rows=[['Patente','Tipo','Entrada','Salida','Minutos','Estado','Total','Usuario']];history.forEach(r=>rows.push([r.plate,r.type,new Date(r.inTime).toLocaleString('es-CL'),new Date(r.outTime).toLocaleString('es-CL'),r.minutes,r.status,r.total,r.user||'']));return rows.map(r=>r.map(csvCell).join(';')).join('\r\n')}function exportExcel(){try{const csv=buildCsv(),bom=new Uint8Array([0xEF,0xBB,0xBF]),blob=new Blob([bom,csv],{type:'text/csv;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='recaudacion_parking.csv';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},0)}catch(e){alert('No se pudo exportar Excel')}}function renderSearch(){const q=clean(byId('searchPlate').value),box=byId('searchList');if(!q){box.innerHTML='<div class="item small">Escribe una patente para buscar.</div>';return}const res=similar(q);box.innerHTML=res.length?res.map(a=>itemHtml(a,true)).join(''):'<div class="item small">No hay resultados.</div>'}function renderInside(){const box=byId('insideList');box.innerHTML=active.length?active.map(a=>itemHtml(a,true)).join(''):'<div class="item small">No hay vehículos dentro.</div>'}function renderHistory(type){type=type||'day';const now=new Date(),day=history.filter(r=>new Date(r.outTime).toDateString()===now.toDateString()),month=history.filter(r=>{const d=new Date(r.outTime);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}),td=day.reduce((s,r)=>s+Number(r.total||0),0),tm=month.reduce((s,r)=>s+Number(r.total||0),0);byId('revenueBox').innerHTML='<div class="two"><div class="item"><div class="small">Recaudado hoy</div><div class="total">'+money(td)+'</div><div class="small">'+day.length+' vehículos</div></div><div class="item"><div class="small">Recaudado mes</div><div class="total">'+money(tm)+'</div><div class="small">'+month.length+' vehículos</div></div></div>';const res=type==='month'?month:day,total=type==='month'?tm:td;byId('historySummary').innerHTML='<div class="item"><b>'+(type==='month'?'Detalle del mes':'Detalle del día')+'</b><div class="small">'+res.length+' vehículos · '+money(total)+'</div></div>';byId('historyList').innerHTML=res.length?res.map(r=>'<div class="item"><div class="plate-title">'+safeText(r.plate)+'</div><div class="small">Entrada: '+new Date(r.inTime).toLocaleString('es-CL')+'</div><div class="small">Salida: '+new Date(r.outTime).toLocaleString('es-CL')+'</div><div class="small">Tiempo: '+safeText(r.minutes)+' minutos · '+safeText(r.status)+'</div><div class="total">'+money(r.total)+'</div></div>').join(''):'<div class="item small">Sin registros.</div>'}function renderUserReport(){const box=byId('userReportList'),now=new Date(),month=history.filter(r=>{const d=new Date(r.outTime);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}),names=[...new Set(month.map(r=>r.user||'Sin usuario'))];box.innerHTML=names.length?names.map(n=>{const rs=month.filter(r=>(r.user||'Sin usuario')===n),total=rs.reduce((s,r)=>s+Number(r.total||0),0);return '<div class="item"><div class="plate-title" style="font-size:18px">'+safeText(n)+'</div><div class="small">'+rs.length+' vehículos este mes</div><div class="total">'+money(total)+'</div></div>'}).join(''):'<div class="item small">Sin registros este mes.</div>'}function loadConfig(){byId('configName').value=config.name;byId('configRate').value=config.rate;byId('configBlock').value=config.block;byId('configMode').value=config.mode}function saveConfig(){config={name:byId('configName').value.trim()||'Parking Pro',rate:Number(byId('configRate').value)||600,block:Number(byId('configBlock').value)||30,mode:byId('configMode').value};save();goHome()}function refresh(){byId('title').textContent=config.name;byId('menuBtn').style.display=currentUser?'block':'none';byId('adminUsersBtn').style.display=(currentUser&&currentUser.role==='admin')?'block':'none';byId('configMenuBtn').style.display=(currentUser&&currentUser.role==='admin')?'block':'none'}
refresh();openScreen(currentUser?'home':'login');
</script>
<script>if ("serviceWorker" in navigator) { window.addEventListener("load", function(){ navigator.serviceWorker.register("./service-worker.js").catch(function(err){console.log("SW error", err);}); }); }</script>
</body></html>
